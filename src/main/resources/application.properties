#Clase 1
spring.application.name=tienda
#Para definir el puerto donde "escuchará" el servidor
server.port=8081

#Clase 2 
#Para definir el formato de despliegue de fecha/hora del log
logging.pattern.dateformat=hh:mm
#Para eliminar mensajes invasivos de Spring 
spring.main.banner-mode=off
#En desarrollo del "caché" del servidor (false) en producción "true"
spring.thymeleaf.cache=false 
